<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>ToDo</title>
    <!--<base href="https://momak.github.io/BatekaToDo/" />-->
    <base href="https://momak.github.io/BatekaToDo/" />

    <!-- MudBlazor CSS FIRST (framework styles) -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- Blazor scoped styles SECOND (component-specific overrides) -->
    <link href="ToDo.styles.css" rel="stylesheet" />

    <!-- Your custom CSS LAST (overrides framework) (wins over everything) -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="css/mobile-fixes.css" rel="stylesheet" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="ios/512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="ios/192.png" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <!-- Scripts... -->
    <!-- iOS Safari Fix Script -->
    <script>
        // Fix for iOS Safari WebAssembly loading
        if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
            // Force layout recalculation for MudBlazor components
            document.addEventListener('DOMContentLoaded', function () {
                setTimeout(function () {
                    // Reflow trick for iOS
                    document.body.style.display = 'none';
                    setTimeout(function () {
                        document.body.style.display = 'block';
                    }, 50);
                }, 100);
            });
        }
    </script>
    <!-- iOS Safari Fix Script -->
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
        (function (l) {
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function (v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
    <script>
        window.getWindowWidth = () => window.innerWidth || 0;
    </script>
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="decode.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="utils.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                // For framework resources, use the precompressed .br files for faster downloads
                // This is needed only because GitHub pages doesn't natively support Brotli (or even gzip for .dll files)
                if (type !== 'dotnetjs' && location.hostname !== 'localhost') {
                    return (async function () {
                        const response = await fetch(defaultUri + '.br', { cache: 'no-cache' });
                        if (!response.ok) {
                            throw new Error(response.statusText);
                        }
                        const originalResponseBuffer = await response.arrayBuffer();
                        const originalResponseArray = new Int8Array(originalResponseBuffer);
                        const decompressedResponseArray = BrotliDecode(originalResponseArray);
                        const contentType = type === 'dotnetwasm' ? 'application/wasm' : 'application/octet-stream';
                        return new Response(decompressedResponseArray, { headers: { 'content-type': contentType } });
                    })();
                }
            }
        });
    </script>
    <!-- iOS specific fixes -->
    <script>
        // Fix for iOS input elements
        if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
            document.addEventListener('touchstart', function () { }, { passive: true });

            // Fix for MudBlazor components
            document.addEventListener('focus', function (e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    document.body.classList.add('keyboard-open');
                }
            }, true);

            document.addEventListener('blur', function (e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    document.body.classList.remove('keyboard-open');
                }
            }, true);
        }
    </script>   
</body>

</html>
